<!DOCTYPE html>
<html>
<head>
<title>Acceso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

/* CONTENEDOR */
.box{
margin-top:80px;
display:flex;
flex-direction:column;
align-items:center;
}

/* INPUT */
input{
padding:14px;
border-radius:12px;
border:none;
width:80%;
max-width:320px;
margin-top:10px;
font-size:16px;
}

/* BOTONES */
button{
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
width:80%;
max-width:320px;
font-size:16px;
cursor:pointer;
}

/* PAYPAL */
.paypal{
background:#0070ba;
color:white;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* TEXTO */
.sub{
margin-top:20px;
color:#9ca3af;
font-size:14px;
}
</style>

</head>

<body>

<div class="box">

<h1>🔐 Acceso requerido</h1>
<p>Introduce tu código</p>

<input id="code" placeholder="Código">
<button onclick="checkCode()">Entrar</button>

<p class="sub">¿No tienes acceso?</p>

<!-- 💳 PAYPAL PRO -->
<a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=anto7004@hotmail.com&amount=2&currency_code=USD&item_name=ProApps&return=https://pro-appstore.github.io/ProApps/verificar.html" target="_blank" style="width:100%;display:flex;justify-content:center;">
<button class="paypal">
<img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" width="24">
Pagar con PayPal
</button>
</a>

</div>

<script>
var codigosValidos = [
"VIP123",
"PRO777",
"APP2026"
];

function checkCode(){
var code = document.getElementById("code").value;

if(codigosValidos.includes(code)){
window.location.href = "apps2.html";
}else{
alert("Código incorrecto");
}
}
</script>

</body>
</html>
